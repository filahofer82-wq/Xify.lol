<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xify</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Outfit:wght@300;400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Blurred full-screen background -->
  <div class="bg">
    <div class="bg-image"></div>
    <div class="bg-fog"></div>
  </div>

  <!-- Floating particles -->
  <canvas id="particles"></canvas>

  <!-- Noise -->
  <div class="noise"></div>

  <!-- ═══ Main container ═══ -->
  <div class="container">

    <!-- Profile row -->
    <div class="profile">
      <div class="avatar-area">
        <div class="avatar-glow"></div>
        <div class="avatar-ring">
          <div class="avatar-img"></div>
        </div>
        <img src="photos/decoration.png" alt="" class="avatar-decoration deco-top">
        <img src="photos/decoration.png" alt="" class="avatar-decoration deco-bottom">
        <span class="status-dot"></span>
      </div>
      <div class="identity">
        <div class="name-row">
          <div class="username-wrap">
            <canvas class="name-particles" aria-hidden="true"></canvas>
            <h1 class="username">Xify</h1>
          </div>
        </div>
        <p class="subtitle">Larp till you make it</p>
      </div>
    </div>

    <!-- Glass cards -->
    <div class="cards">
      <div class="spotify-card card-tilt">
        <!-- Spotify icon -->
        <svg class="sp-logo" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>

        <!-- Album art -->
        <div class="sp-album"></div>

        <!-- Track info -->
        <div class="sp-info">
          <span class="sp-title">Pane šerife</span>
          <span class="sp-artist">Skippy McDippy</span>
        </div>

        <!-- Controls -->
        <div class="sp-controls">
          <!-- Shuffle -->
          <svg class="sp-btn sp-btn--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>

          <!-- Prev -->
          <svg class="sp-btn sp-btn--sm" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>

          <!-- Play -->
          <a href="https://open.spotify.com/track/12ZYED49EhjDe8Jiqdrhhk?si=530e80c2c12a4259" target="_blank" rel="noopener noreferrer" class="sp-play">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </a>

          <!-- Next -->
          <svg class="sp-btn sp-btn--sm" viewBox="0 0 24 24" fill="currentColor"><path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z"/></svg>

          <!-- Repeat -->
          <svg class="sp-btn sp-btn--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </div>
      </div>
    </div>

    <!-- Social icons -->
    <div class="socials">
      <a href="https://steamcommunity.com/id/bot7k/" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Steam">
        <img src="photos/steam.png" alt="Steam" class="social-img">
      </a>
      <a href="#" class="social-icon has-tooltip" aria-label="Discord">
        <span class="tooltip">dejmilion</span>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      </a>
      <a href="#" class="social-icon disabled" aria-label="Twitter / X">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a href="#" class="social-icon disabled" aria-label="TikTok">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 0 0-.79-.05A6.34 6.34 0 0 0 3.15 15a6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.71a8.21 8.21 0 0 0 4.76 1.52v-3.4a4.85 4.85 0 0 1-1-.14z"/></svg>
      </a>
      <a href="#" class="social-icon disabled" aria-label="Twitch">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
      </a>
    </div>

    <!-- Footer -->
    <div class="footer">Xify &copy; 2026</div>

  </div>

  <script src="script.js"></script>
</body>
</html>
