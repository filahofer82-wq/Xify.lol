<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="none"/>
  <text x="32" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="38" fill="#f0f0f2" filter="url(#glow)">X</text>
</svg>
